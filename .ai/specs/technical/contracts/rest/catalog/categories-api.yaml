# =============================================================================
# Categories API Spec (Service/Selector Layer)
# =============================================================================
spec:
  name: catalog-categories
  domain: catalog
  type: api
  version: 1.1.0
  status: implemented
  last_updated: 2026-05-28

  description: >
    Hierarchical product categories with parent-child relationships.
    Service/selector layer plus REST API endpoints.

  scope:
    in:
      - List active categories (ordered by display_order)
      - Get category by slug
      - Create category with optional parent (authenticated)
    out:
      - Category update endpoint (use service directly)
      - Category delete endpoint

  entities:
    - name: Category
      table: catalog_category
      description: Hierarchical product category with self-referencing parent
      fields:
        - name: id
          type: integer
          constraints: [required]
        - name: parent
          type: fk
          fk_target: Category
          nullable: true
          on_delete: protect
          related_name: children
        - name: name
          type: string
          max_length: 255
          constraints: [required]
        - name: slug
          type: string
          format: slug
          constraints: [required, unique]
        - name: image
          type: image
          upload_to: categories/
          required: false
        - name: display_order
          type: integer
          default: 0
        - name: is_active
          type: boolean
          default: true
        - name: created_at
          type: datetime
          auto: now_add
        - name: updated_at
          type: datetime
          auto: now
      indexes:
        - fields: [display_order]
          condition: is_active=True
          name: idx_category_active_order

  endpoints:
    - method: GET
      path: /api/v1/catalog/categories/
      description: List active categories ordered by display_order
      auth: AllowAny
      response:
        status: 200
        schema:
          type: object
          properties:
            count: { type: integer }
            next: { type: string, nullable: true }
            previous: { type: string, nullable: true }
            results:
              type: array
              items:
                $ref: '#/entities/Category'
      selector: catalog/selectors.py:get_active_categories

    - method: GET
      path: /api/v1/catalog/categories/{slug}/
      description: Get a single active category by slug
      auth: AllowAny
      path_params:
        - name: slug
          type: string
      response:
        status: 200
        schema: '#/entities/Category'
      exceptions:
        - CategoryNotFoundError → 404
      selector: catalog/selectors.py:get_category_by_slug

    - method: POST
      path: /api/v1/catalog/categories/
      description: Create a new category (admin only)
      auth: IsAuthenticated
      request:
        schema:
          type: object
          required: [name, slug]
          properties:
            name: { type: string, maxLength: 255 }
            slug: { type: string }
            parent_id: { type: integer, nullable: true }
            display_order: { type: integer, default: 0 }
            image: { type: file, required: false }
      response:
        status: 201
        schema: '#/entities/Category'
      exceptions:
        - CategoryNotFoundError → 404 (parent not found)
      service: catalog/services.py:create_category

  business_rules:
    - id: BR-001
      description: Category parent is protected from deletion (on_delete=PROTECT)
      enforcement: model
      location: catalog/models.py:Category.parent

    - id: BR-002
      description: Only active categories appear in listings
      enforcement: selector
      location: catalog/selectors.py:get_active_categories

    - id: BR-003
      description: Categories are ordered by display_order in listings
      enforcement: selector
      location: catalog/selectors.py:get_active_categories

  exceptions:
    - name: CategoryNotFoundError
      http_status: 404
      message: "Category '{slug}' not found."
      inherits: DomainException
      trigger: Lookup by slug that does not exist

  authorization:
    default: IsAuthenticated

  testing:
    unit:
      - scenario: "Create category without parent"
        input: { name: "Electronics", slug: "electronics" }
        expected: Category created, parent=None
      - scenario: "Create category with parent"
        input: { name: "Laptops", slug: "laptops", parent_id: 1 }
        expected: Category created, parent=Category(1)
      - scenario: "List active categories returns ordered list"
        expected: Categories ordered by display_order, only is_active=True

  changelog:
    - version: 1.0.0
      date: 2026-05-28
      author: ""
      changes:
        - "Initial spec (backfilled from implementation)"
    - version: 1.1.0
      date: 2026-05-31
      author: "nazmulnabil"
      changes:
        - "Added REST API endpoints (list, detail, create)"
        - "Added API test scenarios"
